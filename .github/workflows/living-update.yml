# .github/workflows/living-update.yml
#
# The living-document automation for "The Shifting Weight of Nations."
#
# What it does:
#   * runs on a schedule (after the two annual IMF WEO releases) and whenever build/data.py
#     changes, and can be run by hand (workflow_dispatch);
#   * installs deps + system font libs, stages the bundled fonts;
#   * runs the 52-check consistency suite — a red check FAILS the job and blocks everything;
#   * rebuilds all three editions from the single source of truth;
#   * opens a PULL REQUEST with the rebuilt outputs (never commits to main blind), so a human
#     ratifies before publication — this is the "directions, not decimals" gate in CI form.
#
# A separate job (on pushes to main) publishes the interactive edition to GitHub Pages.
#
# Setup (one time, in repo Settings):
#   Actions → General → Workflow permissions → "Read and write" + "Allow Actions to create PRs"
#   Pages → Source → "GitHub Actions"

name: living-update

on:
  schedule:
    # ~2 weeks after the IMF WEO April and October releases (UTC). Adjust as needed.
    - cron: "0 6 1 5 *"    # 1 May
    - cron: "0 6 1 11 *"   # 1 November
  push:
    paths:
      - "build/data.py"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System libraries for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev libcairo2 fonts-dejavu-core fontconfig

      - name: Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install weasyprint fonttools brotli pypdf cairosvg pyspellchecker matplotlib numpy

      - name: Stage bundled fonts
        run: |
          mkdir -p ~/.fonts
          cp build/ttf/*.ttf ~/.fonts/ 2>/dev/null || true
          fc-cache -f

      - name: Consistency suite (blocks the build if red)
        working-directory: build
        run: |
          python3 check_consistency.py | tee /tmp/checks.txt
          grep -q "0 FAILED" /tmp/checks.txt

      - name: Rebuild the three editions
        working-directory: build
        env:
          # WeasyPrint reads the bundled @fontsource woff2 from the repo
          WON_FONTS_DIR: ${{ github.workspace }}/build/fonts/@fontsource
          WON_OUTPUT_DIR: ${{ github.workspace }}/outputs
        run: |
          python3 build_pdf.py
          python3 build_html.py
          python3 build_audio.py

      - name: Open a pull request with the rebuilt editions
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "living-update: rebuild editions from refreshed data"
          title: "Living update — rebuilt editions"
          body: |
            Automated rebuild from the single source of truth.

            **Before merging, a human must confirm:**
            - the consistency suite passed (52/0) — see the job log;
            - this is a **decimals-only** refresh (every direction in the prose still holds).
              If a *direction* changed, this is a new analytical edition and must go through
              the review body (`skills/weight-of-nations-panel`) and an edition bump first —
              close this PR and handle it in a chair session.
          branch: living-update/auto-rebuild
          add-paths: |
            outputs/**
          delete-branch: true

  pages:
    # Publish the interactive edition as the site, on pushes to main.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: []
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble the site (interactive edition as index.html)
        run: |
          mkdir -p _site
          cp outputs/the-shifting-weight-of-nations.html _site/index.html
          cp outputs/the-shifting-weight-of-nations.pdf _site/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
