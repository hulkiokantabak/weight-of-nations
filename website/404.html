<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — The Shifting Weight of Nations</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#F4EEE2">
<link rel="icon" href="/weight-of-nations/assets/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/weight-of-nations/assets/favicon-32.png" sizes="32x32" type="image/png">
<style>
  @font-face{font-family:'Fraunces';font-weight:600;font-display:swap;src:url('/weight-of-nations/assets/fonts/fraunces-600.woff2') format('woff2')}
  @font-face{font-family:'Fraunces';font-style:italic;font-weight:400;font-display:swap;src:url('/weight-of-nations/assets/fonts/fraunces-400-italic.woff2') format('woff2')}
  @font-face{font-family:'IBM Plex Sans';font-weight:400;font-display:swap;src:url('/weight-of-nations/assets/fonts/plex-sans-400.woff2') format('woff2')}
  @font-face{font-family:'IBM Plex Mono';font-weight:400;font-display:swap;src:url('/weight-of-nations/assets/fonts/plex-mono-400.woff2') format('woff2')}
  :root{--paper:#F4EEE2;--paper-2:#FBF7EF;--ink:#221C17;--ink-soft:#52493F;--ink-faint:#6E6456;--rule:#D7CCB9;--accent:#993C1D}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--paper-2);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;padding:24px}
  .box{max-width:34rem;text-align:center}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin:0 0 18px}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(2.2rem,6vw,3rem);line-height:1.05;margin:0 0 .3em}
  .rule-quote{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:1.15rem;color:var(--ink-soft);
    border-top:1.5px solid var(--accent);border-bottom:1px solid var(--rule);padding:18px 0;margin:24px auto;max-width:30ch}
  p{color:var(--ink-soft);margin:0 0 1.4em}
  .cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a{color:var(--accent);text-decoration:none}
  .btn{display:inline-block;font-weight:500;font-size:.92rem;padding:11px 18px;border-radius:4px;border:1.4px solid var(--accent);transition:.15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#7d2f16}
  .btn-ghost:hover{background:rgba(153,60,29,.07)}
  a:focus-visible,.btn:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}
</style>
</head>
<body>
  <main class="box">
    <p class="kicker">404 · page not found</p>
    <h1>That page isn't on the map.</h1>
    <blockquote class="rule-quote">Read the ruler first, the direction second, and the decimal point last.</blockquote>
    <p>The link may be stale, or the page may have moved between editions. The living version is always at the home page.</p>
    <div class="cta">
      <a class="btn btn-primary" href="/weight-of-nations/">Return home</a>
      <a class="btn btn-ghost" href="/weight-of-nations/edition.html">Read the essay</a>
      <a class="btn btn-ghost" href="https://github.com/hulkiokantabak/weight-of-nations">Repository</a>
    </div>
  </main>
</body>
</html>
